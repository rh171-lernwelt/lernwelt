<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pauls Würfel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#241468;
    --bg2:#5b2bc9;
    --bg3:#8a3ffc;
    --die:#fffaf2;
    --die-edge:#ffe7c2;
    --pip:#241048;
    --yellow:#ffd23f;
    --coral:#ff5c7a;
    --mint:#3ddc97;
    --sky:#54d2ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Nunito',system-ui,sans-serif;
    background:radial-gradient(circle at 50% 0%, var(--bg3) 0%, var(--bg2) 38%, var(--bg1) 100%);
    color:#fff;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
    position:relative;
    text-align:center;
  }
  /* floating background blobs */
  .blob{position:fixed;border-radius:50%;filter:blur(6px);opacity:.18;pointer-events:none;z-index:0;}
  .b1{width:180px;height:180px;background:var(--yellow);top:8%;left:-40px;animation:float1 9s ease-in-out infinite;}
  .b2{width:220px;height:220px;background:var(--coral);bottom:6%;right:-60px;animation:float2 11s ease-in-out infinite;}
  .b3{width:120px;height:120px;background:var(--mint);top:30%;right:10%;animation:float1 13s ease-in-out infinite;}
  @keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-26px)}}
  @keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(24px)}}

  header{z-index:2;margin-top:clamp(18px,5vh,46px);padding:0 18px;}
  .hi{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.05rem;letter-spacing:.5px;color:var(--yellow);text-shadow:0 2px 0 rgba(0,0,0,.18);}
  h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(2rem,8vw,2.9rem);line-height:1;margin-top:4px;text-shadow:0 4px 0 rgba(0,0,0,.22);}
  h1 .emoji{display:inline-block;animation:wobble 3s ease-in-out infinite;}
  @keyframes wobble{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}

  main{z-index:2;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:10px 18px 0;}

  /* 3D scene */
  .scene{width:160px;height:160px;perspective:900px;margin:clamp(8px,3vh,26px) 0;}
  .die{
    width:160px;height:160px;position:relative;
    transform-style:preserve-3d;
    transform:rotateX(-22deg) rotateY(22deg);
    cursor:pointer;
  }
  .die.rolling{animation:none;}
  .face{
    position:absolute;width:160px;height:160px;
    background:linear-gradient(150deg,var(--die) 60%,var(--die-edge));
    border-radius:26px;
    box-shadow:inset 0 0 0 4px rgba(255,255,255,.6), inset 0 -10px 18px rgba(0,0,0,.10);
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
    padding:20px;gap:6px;
    backface-visibility:hidden;
  }
  .pip{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 35% 30%, #5a3fb0, var(--pip));align-self:center;justify-self:center;max-width:30px;max-height:30px;box-shadow:inset 0 -2px 3px rgba(0,0,0,.35);}
  .cell{display:flex;align-items:center;justify-content:center;}
  /* face placement (cube size 160 -> translateZ 80) */
  .f-front {transform:rotateY(0deg)   translateZ(80px);}
  .f-back  {transform:rotateY(180deg) translateZ(80px);}
  .f-right {transform:rotateY(90deg)  translateZ(80px);}
  .f-left  {transform:rotateY(-90deg) translateZ(80px);}
  .f-top   {transform:rotateX(90deg)  translateZ(80px);}
  .f-bottom{transform:rotateX(-90deg) translateZ(80px);}

  /* result message */
  .msg{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.35rem;min-height:1.8em;margin-top:6px;text-shadow:0 2px 0 rgba(0,0,0,.2);transition:transform .2s;}
  .msg.pop{transform:scale(1.18);}

  /* roll button */
  .roll-btn{
    font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.5rem;color:#3a1a00;
    background:linear-gradient(180deg,#ffe169,var(--yellow));
    border:none;border-radius:22px;padding:18px 46px;margin-top:clamp(10px,3vh,22px);
    cursor:pointer;box-shadow:0 7px 0 #c89a13, 0 12px 22px rgba(0,0,0,.3);
    transition:transform .08s, box-shadow .08s;
    -webkit-user-select:none;user-select:none;
  }
  .roll-btn:active{transform:translateY(5px);box-shadow:0 2px 0 #c89a13,0 6px 12px rgba(0,0,0,.3);}
  .roll-btn:disabled{opacity:.55;cursor:default;transform:none;box-shadow:0 7px 0 #c89a13;}
  .roll-btn:focus-visible{outline:4px solid var(--sky);outline-offset:4px;}

  /* stats */
  .stats{z-index:2;display:flex;gap:12px;margin:clamp(16px,4vh,30px) 0 8px;flex-wrap:wrap;justify-content:center;padding:0 16px;}
  .stat{background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.18);border-radius:18px;padding:10px 18px;min-width:90px;backdrop-filter:blur(4px);}
  .stat .num{font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.7rem;line-height:1;}
  .stat .lbl{font-size:.78rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;opacity:.8;margin-top:4px;}
  .stat.six .num{color:var(--yellow);}

  /* history strip */
  .history{z-index:2;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:340px;min-height:34px;margin-bottom:10px;padding:0 16px;}
  .mini{width:30px;height:30px;border-radius:8px;background:var(--die);color:var(--pip);font-family:'Fredoka',sans-serif;font-weight:700;font-size:1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 6px rgba(0,0,0,.25);animation:drop .3s ease;}
  .mini.s6{background:var(--yellow);}
  @keyframes drop{from{transform:translateY(-12px) scale(.5);opacity:0}to{transform:none;opacity:1}}

  .reset{z-index:2;background:none;border:none;color:rgba(255,255,255,.6);font-family:'Nunito';font-weight:700;font-size:.85rem;cursor:pointer;padding:8px 14px;margin-bottom:18px;text-decoration:underline;}
  .reset:hover{color:#fff;}

  canvas#confetti{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:5;}

  @media (prefers-reduced-motion: reduce){
    .b1,.b2,.b3,h1 .emoji{animation:none;}
  }
</style>
</head>
<body>
<a href="index.html" id="hubHomeBtn" onclick="return hubGoHome(event)" aria-label="Zurueck zur Startseite">🏠 Startseite</a>
<style>
#hubHomeBtn{position:fixed;top:12px;left:12px;z-index:2147483600;display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;font-weight:700;font-size:14px;line-height:1;color:#1b1c22;background:rgba(255,255,255,.92);border:1px solid rgba(0,0,0,.08);border-radius:999px;padding:9px 14px;box-shadow:0 4px 14px rgba(20,22,40,.18);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);cursor:pointer;}
#hubHomeBtn:hover{background:#fff;}
#hubHomeBtn:active{transform:translateY(1px);}
#hubHomeBtn:focus-visible{outline:3px solid #9db4ff;outline-offset:2px;}
@media print{#hubHomeBtn{display:none!important;}}
</style>
<script>function hubGoHome(e){if(e&&e.preventDefault)e.preventDefault();var u=null;try{u=localStorage.getItem("hub-url");}catch(x){}window.location.href=u||"index.html";return false;}</script>

  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>

  <header>
    <div class="hi">Hallo Paul! 👋</div>
    <h1>Pauls <span class="emoji">🎲</span> Würfel</h1>
  </header>

  <main>
    <div class="scene">
      <div class="die" id="die" role="button" tabindex="0" aria-label="Würfel – tippen zum Würfeln">
        <!-- 1 front --><div class="face f-front"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"><span class="pip"></span></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
        <!-- 6 back  --><div class="face f-back"><div class="cell"><span class="pip"></span></div><div class="cell"></div><div class="cell"><span class="pip"></span></div><div class="cell"><span class="pip"></span></div><div class="cell"></div><div class="cell"><span class="pip"></span></div><div class="cell"><span class="pip"></span></div><div class="cell"></div><div class="cell"><span class="pip"></span></div></div>
        <!-- 3 right --><div class="face f-right"><div class="cell"><span class="pip"></span></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"><span class="pip"></span></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"><span class="pip"></span></div></div>
        <!-- 4 left  --><div class="face f-left"><div class="cell"><span class="pip"></span></div><div class="cell"></div><div class="cell"><span class="pip"></span></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"><span class="pip"></span></div><div class="cell"></div><div class="cell"><span class="pip"></span></div></div>
        <!-- 5 top   --><div class="face f-top"><div class="cell"><span class="pip"></span></div><div class="cell"></div><div class="cell"><span class="pip"></span></div><div class="cell"></div><div class="cell"><span class="pip"></span></div><div class="cell"></div><div class="cell"><span class="pip"></span></div><div class="cell"></div><div class="cell"><span class="pip"></span></div></div>
        <!-- 2 bottom--><div class="face f-bottom"><div class="cell"><span class="pip"></span></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"><span class="pip"></span></div></div>
      </div>
    </div>

    <div class="msg" id="msg">Tipp auf den Würfel! 👆</div>

    <button class="roll-btn" id="rollBtn">Würfeln!</button>
  </main>

  <div class="stats">
    <div class="stat"><div class="num" id="sCount">0</div><div class="lbl">Würfe</div></div>
    <div class="stat"><div class="num" id="sSum">0</div><div class="lbl">Summe</div></div>
    <div class="stat six"><div class="num" id="sSix">0</div><div class="lbl">Sechser</div></div>
  </div>

  <div class="history" id="history"></div>

  <button class="reset" id="resetBtn">Alles zurücksetzen</button>

  <canvas id="confetti"></canvas>

<script>
(function(){
  "use strict";

  // -- persistent stats (Pauls Gerät) --
  var KEY = "pauls-wuerfel";
  var stats = { count:0, sum:0, six:0, hist:[] };
  try {
    var saved = localStorage.getItem(KEY);
    if (saved) stats = Object.assign(stats, JSON.parse(saved));
  } catch(e){}
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(stats)); }catch(e){} }

  var die = document.getElementById("die");
  var msg = document.getElementById("msg");
  var rollBtn = document.getElementById("rollBtn");
  var resetBtn = document.getElementById("resetBtn");
  var sCount = document.getElementById("sCount");
  var sSum = document.getElementById("sSum");
  var sSix = document.getElementById("sSix");
  var historyEl = document.getElementById("history");

  // which rotation brings each number to the front
  var faceT = {
    1:{x:0,   y:0},
    2:{x:90,  y:0},
    3:{x:0,   y:-90},
    4:{x:0,   y:90},
    5:{x:-90, y:0},
    6:{x:0,   y:180}
  };
  var baseX = -22, baseY = 22; // accumulated turns
  var rolling = false;

  var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  var lines = {
    1:["Eine Eins! Wenig, aber fein.","Eine Eins – der Anfang!","Nur eine Eins, beim nächsten Mal mehr!"],
    2:["Eine Zwei!","Zwei – läuft doch!","Eine Zwei, weiter geht's!"],
    3:["Eine Drei!","Drei – gar nicht schlecht!","Eine Drei für Paul!"],
    4:["Eine Vier!","Vier – stark!","Eine Vier, super!"],
    5:["Eine Fünf! Fast geschafft!","Fünf – richtig gut!","Eine Fünf, klasse!"],
    6:["🎉 SECHS! Top!","Eine Sechs – Volltreffer!","🎉 Sechs! Glückspilz!"]
  };
  function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

  // -- sound (Web Audio) --
  var actx = null;
  function ac(){ if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return actx; }
  function click(t, freq, vol){
    var c = ac(); if(!c) return;
    var o = c.createOscillator(), g = c.createGain();
    o.type="square"; o.frequency.value=freq;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t+0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.06);
    o.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t+0.07);
  }
  function rollSound(){
    var c = ac(); if(!c) return;
    var t = c.currentTime;
    for(var i=0;i<7;i++){ click(t + i*0.09, 180 + Math.random()*260, 0.12); }
  }
  function landSound(n){
    var c = ac(); if(!c) return;
    var t = c.currentTime;
    if(n===6){
      [523,659,784,1046].forEach(function(f,i){ click(t+i*0.09, f, 0.22); });
    } else {
      var o=c.createOscillator(), g=c.createGain();
      o.type="triangle"; o.frequency.value=240+n*40;
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.25,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.22);
      o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+0.24);
    }
  }

  function render(){
    sCount.textContent = stats.count;
    sSum.textContent = stats.sum;
    sSix.textContent = stats.six;
    historyEl.innerHTML = "";
    stats.hist.slice(-10).forEach(function(n){
      var d = document.createElement("div");
      d.className = "mini" + (n===6?" s6":"");
      d.textContent = n;
      historyEl.appendChild(d);
    });
  }

  function roll(){
    if(rolling) return;
    rolling = true;
    rollBtn.disabled = true;
    if(ac() && ac().state==="suspended") ac().resume();

    var n = 1 + Math.floor(Math.random()*6);
    var t = faceT[n];
    var spins = reduce ? 1 : (3 + Math.floor(Math.random()*3));
    baseX += 360*spins;
    baseY += 360*spins;
    var dur = reduce ? 350 : 950;

    die.style.transition = "transform " + dur + "ms cubic-bezier(.2,.9,.25,1.15)";
    die.style.transform = "rotateX(" + (baseX + t.x) + "deg) rotateY(" + (baseY + t.y) + "deg)";
    rollSound();

    window.setTimeout(function(){
      landSound(n);
      stats.count++; stats.sum += n; if(n===6) stats.six++;
      stats.hist.push(n);
      if(stats.hist.length>40) stats.hist = stats.hist.slice(-40);
      save();
      render();
      msg.textContent = pick(lines[n]);
      msg.classList.add("pop");
      setTimeout(function(){ msg.classList.remove("pop"); }, 200);
      if(n===6) confetti();
      // little landing squash
      if(!reduce){
        die.animate(
          [{transform:die.style.transform.replace(/$/,'') + " scale(1)"},
           {transform:die.style.transform + " scale(1.12,.88)"},
           {transform:die.style.transform + " scale(1)"}],
          {duration:260, easing:"ease-out"}
        );
      }
      rolling = false;
      rollBtn.disabled = false;
    }, dur);
  }

  rollBtn.addEventListener("click", roll);
  die.addEventListener("click", roll);
  die.addEventListener("keydown", function(e){
    if(e.key===" "||e.key==="Enter"){ e.preventDefault(); roll(); }
  });

  resetBtn.addEventListener("click", function(){
    stats = { count:0, sum:0, six:0, hist:[] };
    save(); render();
    msg.textContent = "Alles auf null – los geht's! 🎲";
  });

  // -- confetti --
  var cv = document.getElementById("confetti");
  var cx = cv.getContext("2d");
  var pieces = [];
  function sizeCv(){ cv.width = innerWidth; cv.height = innerHeight; }
  sizeCv(); window.addEventListener("resize", sizeCv);
  var colors = ["#ffd23f","#ff5c7a","#3ddc97","#54d2ff","#fff"];
  function confetti(){
    if(reduce) return;
    for(var i=0;i<90;i++){
      pieces.push({
        x: innerWidth/2, y: innerHeight*0.4,
        vx:(Math.random()-0.5)*11, vy:-(Math.random()*11+5),
        g:0.32, r:Math.random()*7+4, rot:Math.random()*6,
        vr:(Math.random()-0.5)*0.4,
        c:colors[Math.floor(Math.random()*colors.length)], life:90
      });
    }
    if(!confLoop) loop();
  }
  var confLoop = false;
  function loop(){
    confLoop = true;
    cx.clearRect(0,0,cv.width,cv.height);
    for(var i=pieces.length-1;i>=0;i--){
      var p = pieces[i];
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life--;
      cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot);
      cx.fillStyle = p.c; cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6);
      cx.restore();
      if(p.y>cv.height+30 || p.life<=0) pieces.splice(i,1);
    }
    if(pieces.length){ requestAnimationFrame(loop); }
    else { cx.clearRect(0,0,cv.width,cv.height); confLoop=false; }
  }

  render();
})();
</script>
</body>
</html>
